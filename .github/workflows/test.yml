# .github/workflows/test.yml

name: Secure Build Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------
      # Checkout
      # ---------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------
      # Commit signing check (Level 3 signal)
      # ---------------------------
      - name: Verify signed commit (best-effort)
        run: |
          git log -1 --show-signature || true

      # ---------------------------
      # Setup Python + tests
      # ---------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest -v --cov=. --cov-report=xml

      # ---------------------------
      # Security scan
      # ---------------------------
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0

      # ---------------------------
      # Build Docker image (IMMUTABLE TAGGING FIX)
      # ---------------------------
      - name: Build Docker image (immutable tag)
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .

      # ---------------------------
      # SBOM (FIX FOR YOUR FAILURE)
      # MUST EXIST EXPLICITLY
      # ---------------------------
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh

      - name: Generate SBOM (CycloneDX)
        run: |
          ./syft dir:. -o cyclonedx-json > sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      # ---------------------------
      # Login to GHCR
      # ---------------------------
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------
      # Push immutable image
      # ---------------------------
      - name: Push image
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}

      # ---------------------------
      # Cosign (Image signing)
      # ---------------------------
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        run: |
          cosign sign --yes $IMAGE_NAME:${{ github.sha }}

      - name: Verify signature
        run: |
          cosign verify $IMAGE_NAME:${{ github.sha }}

      # ---------------------------
      # Artifact signing (Level 5)
      # ---------------------------
      - name: Generate checksum (artifact signing)
        run: |
          sha256sum sbom.json > sbom.json.sha256

      # ---------------------------
      # Provenance (in-toto equivalent)
      # ---------------------------
      - name: Generate provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: sbom.json

      # ---------------------------
      # Upload signed artifacts
      # ---------------------------
      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-artifacts
          path: |
            sbom.json
            sbom.json.sha256