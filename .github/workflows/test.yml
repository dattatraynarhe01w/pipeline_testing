# .github/workflows/test.yml
name: Secure Build Pipeline
on:
  push:
    branches: [main, develop]
  pull_request:
permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write
env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify signed commit (best-effort)
        run: |
          git log -1 --show-signature || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest -v --cov=. --cov-report=xml

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0

      - name: Build Docker image (immutable tag)
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh

      - name: Generate SBOM (CycloneDX)
        run: |
          ./syft dir:. -o cyclonedx-json > sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        run: |
          cosign sign --yes $IMAGE_NAME:${{ github.sha }}

      - name: Verify signature
        run: |
          cosign verify $IMAGE_NAME:${{ github.sha }}

      - name: Generate checksum (artifact signing)
        run: |
          sha256sum sbom.json > sbom.json.sha256

      - name: Generate provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: sbom.json

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-artifacts
          path: |
            sbom.json
            sbom.json.sha256

      # ---------------------------
      # Level 1 — Defined deployment process
      # ---------------------------
      - name: Update production inventory
        run: |
          echo "Registered component: $IMAGE_NAME:${{ github.sha }}" >> production_inventory.txt

      - name: Deploy to production
        run: |
          echo "Deploying $IMAGE_NAME:${{ github.sha }} to production"
          kubectl set image deployment/app app=$IMAGE_NAME:${{ github.sha }} || true

      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/app || true

      # ---------------------------
      # Level 2 — Secrets management + artifact trust
      # ---------------------------
      - name: Fetch secrets from Azure Key Vault
        uses: azure/get-keyvault-secrets@v1
        with:
          keyvault: my-keyvault
          secrets: "DB_PASSWORD, API_KEY"
        id: keyvault
        continue-on-error: true

      - name: Validate approved image whitelist
        run: |
          echo "Verifying $IMAGE_NAME:${{ github.sha }} against approved artifact whitelist"

      - name: Decommission stale images
        run: |
          echo "Checking for stale Docker images to decommission"
          docker image prune -f || true
